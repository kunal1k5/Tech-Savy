services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: gigpredict_ai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  ai-engine:
    build:
      context: ./ai-engine
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      WEATHER_API_KEY: ${WEATHER_API_KEY:-}
      WEATHER_API_BASE_URL: ${WEATHER_API_BASE_URL:-https://weather.indianapi.in}
      DEFAULT_WEATHER_CITY: ${DEFAULT_WEATHER_CITY:-Bengaluru}
      LOCATION_MODEL_PATH: /app/models/location_model.pkl
      LOCATION_REFERENCE_PATH: /app/data/next_location_reference.csv
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./ai-engine:/app

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      PORT: 5000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: gigpredict_ai
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      REDIS_URL: redis://redis:6379
      AI_ENGINE_URL: http://ai-engine:8000
      AI_ENGINE_TIMEOUT_MS: 10000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      ai-engine:
        condition: service_started
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:5000/api
      REACT_APP_FLASK_API_URL: http://localhost:8000
    depends_on:
      - backend
      - ai-engine
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  pgdata:
